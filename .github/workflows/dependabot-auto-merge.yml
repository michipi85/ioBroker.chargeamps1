name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for safe Dependabot updates
        if: |
          (
            steps.dependabot-metadata.outputs.dependency-type == 'direct:production' &&
            steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch'
          ) ||
          (
            steps.dependabot-metadata.outputs.dependency-type == 'direct:production' &&
            (
              steps.dependabot-metadata.outputs.update-type == 'security-update:semver-patch' ||
              steps.dependabot-metadata.outputs.update-type == 'security-update:semver-minor'
            )
          ) ||
          (
            steps.dependabot-metadata.outputs.dependency-type == 'direct:development' &&
            (
              steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
              steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
            )
          )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
